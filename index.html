<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor y Firma de PDF Profesional</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- PDF.js para visualizar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- PDF-lib para guardar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

    <style>
        img { user-drag: none; -webkit-user-drag: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Patrón de cuadros para evidenciar la transparencia */
        .bg-checkerboard {
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e5e7eb 75%), linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        /* Eliminar estilos por defecto de inputs */
        .text-element-input {
            background: transparent; border: none; outline: none; resize: none; overflow: hidden;
            width: 100%; white-space: pre-wrap; word-wrap: break-word; line-height: 1.2;
        }
    </style>
</head>
<body class="bg-gray-200 h-screen overflow-hidden text-gray-800 font-sans">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // --- ICONOS ---
        const FileUpIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M12 12v6"/><path d="m15 15-3-3-3 3"/></svg>;
        const PenIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>;
        const TypeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>;
        const SaveIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const TrashIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const ImageIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
        const XIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const ZoomInIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
        const ZoomOutIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
        const ShieldIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const ZapIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
        const CheckCircleIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const BoldIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 12a4 4 0 0 0 0-8H6v8"/><path d="M15 20a4 4 0 0 0 0-8H6v8Z"/></svg>;
        const ItalicIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>;
        const LayersIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
        const ArrowUpIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>;
        const ArrowDownIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>;
        const PlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const ArrowLeftIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;

        // --- GESTOR DE FIRMAS ---
        const SignatureManager = ({ onSelectSignature, onClose, savedSignatures, setSavedSignatures }) => {
            const [tab, setTab] = useState('library');
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [penColor, setPenColor] = useState('#000000');
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (tab === 'draw' && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = penColor;
                }
            }, [tab, penColor]);

            const getCoordinates = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const scaleX = canvasRef.current.width / rect.width;
                const scaleY = canvasRef.current.height / rect.height;
                return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
            };

            const startDrawing = (e) => {
                e.preventDefault(); setIsDrawing(true);
                const { x, y } = getCoordinates(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath(); ctx.moveTo(x, y);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const { x, y } = getCoordinates(e);
                canvasRef.current.getContext('2d').lineTo(x, y);
                canvasRef.current.getContext('2d').stroke();
            };

            const stopDrawing = () => setIsDrawing(false);
            const clearPad = () => {
                const canvas = canvasRef.current;
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            };

            const handleSaveDraw = () => {
                const dataUrl = canvasRef.current.toDataURL('image/png');
                setSavedSignatures(prev => [...prev, dataUrl]);
                onSelectSignature(dataUrl);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        
                        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imgData.data;
                        for (let i = 0; i < data.length; i += 4) {
                            const r = data[i], g = data[i+1], b = data[i+2];
                            if (r > 200 && g > 200 && b > 200) data[i+3] = 0;
                        }
                        ctx.putImageData(imgData, 0, 0);
                        const transparentDataUrl = canvas.toDataURL('image/png');
                        setSavedSignatures(prev => [...prev, transparentDataUrl]);
                        onSelectSignature(transparentDataUrl);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg flex flex-col overflow-hidden">
                        <div className="bg-gray-50 border-b border-gray-200">
                            <div className="flex justify-between items-center p-4 pb-0">
                                <h3 className="font-bold text-gray-800 text-lg">Añadir Firma</h3>
                                <button onClick={onClose} className="text-gray-400 hover:text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-full p-1 transition-colors"><XIcon /></button>
                            </div>
                            <div className="flex gap-4 px-4 pt-4">
                                <button onClick={() => setTab('library')} className={`pb-2 px-1 font-medium border-b-2 transition-colors ${tab === 'library' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>Mis Firmas</button>
                                <button onClick={() => setTab('draw')} className={`pb-2 px-1 font-medium border-b-2 transition-colors ${tab === 'draw' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>Dibujar</button>
                                <button onClick={() => setTab('upload')} className={`pb-2 px-1 font-medium border-b-2 transition-colors ${tab === 'upload' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>Subir Imagen</button>
                            </div>
                        </div>

                        <div className="p-6 bg-white min-h-[250px] flex flex-col justify-center">
                            {tab === 'library' && (
                                <div className="flex flex-col h-full">
                                    {savedSignatures.length === 0 ? (
                                        <div className="text-center text-gray-400 py-10 flex flex-col items-center gap-2">
                                            <PenIcon />
                                            <p>No tienes firmas guardadas.</p>
                                            <button onClick={() => setTab('draw')} className="text-blue-600 text-sm font-medium mt-2">Dibuja una ahora</button>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-4">
                                            {savedSignatures.map((sigUrl, idx) => (
                                                <div key={idx} onClick={() => onSelectSignature(sigUrl)} className="border-2 border-dashed border-gray-300 rounded-lg p-2 h-24 flex items-center justify-center cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-colors bg-checkerboard relative group">
                                                    <img src={sigUrl} className="max-h-full max-w-full object-contain drop-shadow-md" alt={`Firma ${idx+1}`} />
                                                    <button onClick={(e) => { e.stopPropagation(); setSavedSignatures(prev => prev.filter((_, i) => i !== idx)); }} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity"><XIcon /></button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {tab === 'draw' && (
                                <div className="flex flex-col items-center gap-4">
                                    <div className="flex gap-4 w-full justify-center items-center bg-gray-50 py-2 rounded-lg border border-gray-200">
                                        <span className="text-sm font-medium text-gray-600">Color de tinta:</span>
                                        <button onClick={() => setPenColor('#000000')} className={`w-8 h-8 rounded-full bg-black shadow-sm transition-transform ${penColor === '#000000' ? 'ring-2 ring-offset-2 ring-blue-500 scale-110' : 'hover:scale-105'}`} title="Negro"></button>
                                        <button onClick={() => setPenColor('#000044')} className={`w-8 h-8 rounded-full shadow-sm transition-transform ${penColor === '#000044' ? 'ring-2 ring-offset-2 ring-blue-500 scale-110' : 'hover:scale-105'}`} style={{ backgroundColor: '#000044' }} title="Azul Oscuro"></button>
                                        <button onClick={() => setPenColor('#1e3a8a')} className={`w-8 h-8 rounded-full shadow-sm transition-transform ${penColor === '#1e3a8a' ? 'ring-2 ring-offset-2 ring-blue-500 scale-110' : 'hover:scale-105'}`} style={{ backgroundColor: '#1e3a8a' }} title="Azul"></button>
                                    </div>
                                    <div className="border border-gray-300 rounded-xl overflow-hidden bg-checkerboard w-full">
                                        <canvas
                                            ref={canvasRef} width={400} height={200} className="w-full touch-none cursor-crosshair"
                                            onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing}
                                            onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing}
                                        ></canvas>
                                    </div>
                                    <div className="flex gap-3 w-full">
                                        <button onClick={clearPad} className="flex-1 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium">Limpiar</button>
                                        <button onClick={handleSaveDraw} className="flex-1 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium shadow-md shadow-blue-500/30">Usar y Guardar</button>
                                    </div>
                                </div>
                            )}

                            {tab === 'upload' && (
                                <div className="flex flex-col items-center justify-center py-6 text-center">
                                    <div className="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-4"><ImageIcon /></div>
                                    <h4 className="font-semibold text-gray-800 mb-2">Sube una foto de tu firma</h4>
                                    <p className="text-sm text-gray-500 mb-6 max-w-xs">Usa una foto con buena iluminación y en un papel blanco. Eliminaremos el fondo automáticamente.</p>
                                    <input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={handleImageUpload} />
                                    <button onClick={() => fileInputRef.current.click()} className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium shadow-md">Seleccionar Imagen</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };


        // --- APLICACIÓN PRINCIPAL ---
        const App = () => {
            const [appMode, setAppMode] = useState('landing'); // 'landing', 'editor', 'merge'
            const [mergeFiles, setMergeFiles] = useState([]); // Archivos para unir

            const [pdfBytes, setPdfBytes] = useState(null);
            const [pdfDocProxy, setPdfDocProxy] = useState(null);
            const [currentPage, setCurrentPage] = useState(1);
            const [totalPages, setTotalPages] = useState(0);
            
            const [pdfImage, setPdfImage] = useState(null);
            const [pdfDimensions, setPdfDimensions] = useState({ width: 0, height: 0 }); 
            const [zoom, setZoom] = useState(1);

            // Datos compartidos (Firmas y Textos)
            const [savedSignatures, setSavedSignatures] = useState([]);
            // Elementos estructurados: { type: 'signature'|'text', id, x, y, ... }
            const [placedElements, setPlacedElements] = useState({}); 
            const [showSignatureModal, setShowSignatureModal] = useState(false);

            // Memoria de configuración del texto
            const [defaultTextConfig, setDefaultTextConfig] = useState({
                fontSize: 16,
                fontFamily: 'Helvetica',
                color: '#000000',
                isBold: false,
                isItalic: false
            });

            // Estado de interacción y edición de texto
            const [interaction, setInteraction] = useState(null); 
            const [activeElementId, setActiveElementId] = useState(null); // Qué elemento está seleccionado
            const [guides, setGuides] = useState({ x: null, y: null }); // Líneas guía para alinear
            
            const containerRef = useRef(null);

            // Efecto para auto-enfocar el textarea cuando se selecciona o crea un texto
            useEffect(() => {
                if (activeElementId) {
                    setTimeout(() => {
                        const activeInput = document.getElementById(`text-input-${activeElementId}`);
                        if (activeInput && document.activeElement !== activeInput) {
                            activeInput.focus();
                            activeInput.selectionStart = activeInput.value.length;
                            activeInput.selectionEnd = activeInput.value.length;
                        }
                    }, 10);
                }
            }, [activeElementId]);

            // --- RENDERIZADO PDF ---
            const renderPage = async (pdf, pageNum) => {
                const page = await pdf.getPage(pageNum);
                const originalViewport = page.getViewport({ scale: 1.0 });
                const renderViewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = renderViewport.height;
                canvas.width = renderViewport.width;

                await page.render({ canvasContext: context, viewport: renderViewport }).promise;
                
                setPdfImage(canvas.toDataURL('image/jpeg', 0.8));
                setPdfDimensions({ width: originalViewport.width, height: originalViewport.height });
                setActiveElementId(null);
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || file.type !== 'application/pdf') return;

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    setPdfBytes(arrayBuffer.slice(0));
                    const loadingTask = window.pdfjsLib.getDocument({ data: arrayBuffer.slice(0) });
                    const pdf = await loadingTask.promise;
                    
                    setPdfDocProxy(pdf);
                    setTotalPages(pdf.numPages);
                    setCurrentPage(1);
                    setPlacedElements({});
                    setAppMode('editor');
                    
                    await renderPage(pdf, 1);
                } catch (error) {
                    console.error("Error al cargar:", error);
                    alert("No se pudo abrir el PDF.");
                }
            };

            // --- LÓGICA DE UNIÓN DE PDF ---
            const handleMergeUpload = (e) => {
                const files = Array.from(e.target.files).filter(f => f.type === 'application/pdf');
                if (files.length > 0) {
                    const newFiles = files.map(f => ({ id: Math.random().toString(36).substr(2, 9), file: f, name: f.name }));
                    setMergeFiles(prev => [...prev, ...newFiles]);
                    setAppMode('merge');
                }
                e.target.value = ''; // Resetear input
            };

            const moveMergeFile = (index, direction) => {
                if (direction === -1 && index === 0) return;
                if (direction === 1 && index === mergeFiles.length - 1) return;
                const newFiles = [...mergeFiles];
                const temp = newFiles[index];
                newFiles[index] = newFiles[index + direction];
                newFiles[index + direction] = temp;
                setMergeFiles(newFiles);
            };

            const performMerge = async () => {
                if (mergeFiles.length < 2) {
                    alert("Por favor, selecciona al menos 2 documentos para unir.");
                    return;
                }
                try {
                    const { PDFDocument } = window.PDFLib;
                    const mergedPdf = await PDFDocument.create();

                    for (const item of mergeFiles) {
                        const arrayBuffer = await item.file.arrayBuffer();
                        const pdf = await PDFDocument.load(arrayBuffer);
                        const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                        copiedPages.forEach((page) => mergedPdf.addPage(page));
                    }

                    const pdfBytesSaved = await mergedPdf.save();
                    const blob = new Blob([pdfBytesSaved], { type: 'application/pdf' });
                    
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'Documentos_Unidos.pdf';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (error) {
                    console.error("Error al unir PDFs:", error);
                    alert("Hubo un error al unir los documentos.");
                }
            };

            const changePage = async (delta) => {
                const newPage = currentPage + delta;
                if (newPage >= 1 && newPage <= totalPages && pdfDocProxy) {
                    setCurrentPage(newPage);
                    await renderPage(pdfDocProxy, newPage);
                }
            };

            // --- AÑADIR ELEMENTOS ---
            const handleAddSignatureToPage = (dataUrl) => {
                const newSig = {
                    id: Date.now().toString(),
                    type: 'signature',
                    dataUrl,
                    x: pdfDimensions.width / 2 - 75,
                    y: pdfDimensions.height / 2 - 40,
                    w: 150,
                    h: 80
                };
                setPlacedElements(prev => ({ ...prev, [currentPage]: [...(prev[currentPage] || []), newSig] }));
                setShowSignatureModal(false);
                setActiveElementId(newSig.id);
            };

            const handleAddTextToPage = () => {
                const newText = {
                    id: Date.now().toString(),
                    type: 'text',
                    text: '', // Empieza vacío para poder escribir directamente
                    x: pdfDimensions.width / 2 - 60,
                    y: pdfDimensions.height / 2 - 10,
                    w: 150, // Ancho base de la caja para interactuar
                    ...defaultTextConfig // Heredar la última configuración guardada
                };
                setPlacedElements(prev => ({ ...prev, [currentPage]: [...(prev[currentPage] || []), newText] }));
                setActiveElementId(newText.id);
            };

            const removeElement = (idToRemove) => {
                setPlacedElements(prev => ({
                    ...prev,
                    [currentPage]: prev[currentPage].filter(el => el.id !== idToRemove)
                }));
                if (activeElementId === idToRemove) setActiveElementId(null);
            };

            const updateTextElement = (id, updates) => {
                setPlacedElements(prev => {
                    const pageEls = prev[currentPage] || [];
                    const updated = pageEls.map(el => el.id === id ? { ...el, ...updates } : el);
                    return { ...prev, [currentPage]: updated };
                });

                // Si se actualizó el formato (fuente, tamaño, color, estilo), guardarlo como nuevo predeterminado
                const styleUpdates = {};
                if (updates.fontSize !== undefined) styleUpdates.fontSize = updates.fontSize;
                if (updates.fontFamily !== undefined) styleUpdates.fontFamily = updates.fontFamily;
                if (updates.color !== undefined) styleUpdates.color = updates.color;
                if (updates.isBold !== undefined) styleUpdates.isBold = updates.isBold;
                if (updates.isItalic !== undefined) styleUpdates.isItalic = updates.isItalic;
                
                if (Object.keys(styleUpdates).length > 0) {
                    setDefaultTextConfig(prev => ({ ...prev, ...styleUpdates }));
                }
            };

            // --- INTERACCIÓN ---
            const getPointerPos = (e) => ({
                clientX: e.touches ? e.touches[0].clientX : e.clientX,
                clientY: e.touches ? e.touches[0].clientY : e.clientY
            });

            const startInteraction = (e, type, el) => {
                e.stopPropagation();
                if (e.type !== 'touchstart') e.preventDefault(); // Permitir touch para enfocar input
                
                setActiveElementId(el.id);
                
                // Si es un input de texto y se hizo clic en él, no iniciamos arrastre para dejar escribir
                if (el.type === 'text' && e.target.tagName.toLowerCase() === 'textarea') return;

                const { clientX, clientY } = getPointerPos(e);
                setInteraction({
                    type, id: el.id, startX: clientX, startY: clientY,
                    initX: el.x, initY: el.y, initW: el.w, initH: el.h
                });
            };

            useEffect(() => {
                const handlePointerMove = (e) => {
                    if (!interaction) return;
                    e.preventDefault(); 

                    const { clientX, clientY } = getPointerPos(e);
                    const dx = (clientX - interaction.startX) / zoom;
                    const dy = (clientY - interaction.startY) / zoom;

                    setPlacedElements(prev => {
                        const pageEls = prev[currentPage] || [];
                        let snappedX = null;
                        let snappedY = null;

                        const updated = pageEls.map(el => {
                            if (el.id === interaction.id) {
                                if (interaction.type === 'drag') {
                                    let newX = interaction.initX + dx;
                                    let newY = interaction.initY + dy;

                                    // Lógica de Líneas Guía (Snapping)
                                    const snapThreshold = 5 / zoom; // Distancia de atracción
                                    
                                    pageEls.forEach(otherEl => {
                                        if (otherEl.id !== el.id) {
                                            // Alinear verticalmente (misma columna X)
                                            if (Math.abs(newX - otherEl.x) < snapThreshold) {
                                                newX = otherEl.x;
                                                snappedX = otherEl.x;
                                            }
                                            // Alinear horizontalmente (misma fila Y)
                                            if (Math.abs(newY - otherEl.y) < snapThreshold) {
                                                newY = otherEl.y;
                                                snappedY = otherEl.y;
                                            }
                                        }
                                    });

                                    return { ...el, x: newX, y: newY };
                                }
                                if (interaction.type === 'resize' && el.type === 'signature') {
                                    return { ...el, w: Math.max(40, interaction.initW + dx), h: Math.max(20, interaction.initH + dy) };
                                }
                                // Nuevo: Ajustar solo el ancho de la caja de texto
                                if (interaction.type === 'resizeTextWidth' && el.type === 'text') {
                                    return { ...el, w: Math.max(50, interaction.initW + dx) };
                                }
                            }
                            return el;
                        });

                        // Actualizar estado de las guías visuales solo durante el arrastre
                        if (interaction.type === 'drag') {
                            setGuides({ x: snappedX, y: snappedY });
                        }

                        return { ...prev, [currentPage]: updated };
                    });
                };

                const handlePointerUp = () => {
                    setInteraction(null);
                    setGuides({ x: null, y: null }); // Limpiar las líneas guía al soltar
                };

                if (interaction) {
                    window.addEventListener('mousemove', handlePointerMove, { passive: false });
                    window.addEventListener('mouseup', handlePointerUp);
                    window.addEventListener('touchmove', handlePointerMove, { passive: false });
                    window.addEventListener('touchend', handlePointerUp);
                }

                return () => {
                    window.removeEventListener('mousemove', handlePointerMove);
                    window.removeEventListener('mouseup', handlePointerUp);
                    window.removeEventListener('touchmove', handlePointerMove);
                    window.removeEventListener('touchend', handlePointerUp);
                };
            }, [interaction, currentPage, zoom]);

            // Deseleccionar al hacer clic fuera
            const handleBackgroundClick = () => setActiveElementId(null);

            // --- EXPORTACIÓN FINAL CON TEXTO ---
            const hexToRgbPdf = (hex) => {
                const { rgb } = window.PDFLib;
                const r = parseInt(hex.slice(1, 3), 16) / 255;
                const g = parseInt(hex.slice(3, 5), 16) / 255;
                const b = parseInt(hex.slice(5, 7), 16) / 255;
                return rgb(r, g, b);
            };

            const exportSignedPDF = async () => {
                if (!pdfBytes) return;

                try {
                    const { PDFDocument, StandardFonts } = window.PDFLib;
                    const pdfDoc = await PDFDocument.load(pdfBytes.slice(0));
                    const pages = pdfDoc.getPages();

                    // Función para obtener la variante correcta de la fuente según estilo (Negrita/Cursiva)
                    const getFont = async (family, isBold, isItalic) => {
                        let fontName;
                        if (family === 'Times New Roman') {
                            if (isBold && isItalic) fontName = StandardFonts.TimesRomanBoldItalic;
                            else if (isBold) fontName = StandardFonts.TimesRomanBold;
                            else if (isItalic) fontName = StandardFonts.TimesRomanItalic;
                            else fontName = StandardFonts.TimesRoman;
                        } else if (family === 'Courier') {
                            if (isBold && isItalic) fontName = StandardFonts.CourierBoldOblique;
                            else if (isBold) fontName = StandardFonts.CourierBold;
                            else if (isItalic) fontName = StandardFonts.CourierOblique;
                            else fontName = StandardFonts.Courier;
                        } else { // Helvetica por defecto
                            if (isBold && isItalic) fontName = StandardFonts.HelveticaBoldOblique;
                            else if (isBold) fontName = StandardFonts.HelveticaBold;
                            else if (isItalic) fontName = StandardFonts.HelveticaOblique;
                            else fontName = StandardFonts.Helvetica;
                        }
                        return await pdfDoc.embedFont(fontName);
                    };

                    for (const pageNumStr of Object.keys(placedElements)) {
                        const pageNum = parseInt(pageNumStr, 10);
                        const elements = placedElements[pageNum];
                        if (!elements || elements.length === 0) continue;

                        const pageToSign = pages[pageNum - 1];
                        const pdfHeight = pageToSign.getHeight();

                        for (const el of elements) {
                            if (el.type === 'signature') {
                                const pngBytes = await fetch(el.dataUrl).then(res => res.arrayBuffer());
                                const pngImage = await pdfDoc.embedPng(pngBytes);
                                const sigY = pdfHeight - el.y - el.h; // PDFLib origen es abajo-izquierda
                                pageToSign.drawImage(pngImage, { x: el.x, y: sigY, width: el.w, height: el.h });
                            } 
                            else if (el.type === 'text') {
                                const lines = el.text.split('\n');
                                const font = await getFont(el.fontFamily, el.isBold, el.isItalic);
                                const lineHeight = el.fontSize * 1.2;
                                
                                // Ajuste fino para la línea base de renderizado entre HTML y PDF
                                // HTML posiciona desde arriba-izquierda. PDF dibuja texto desde su línea base (bottom-left).
                                // Entonces restamos la altura de la fuente y ajustamos.
                                let currentY = pdfHeight - el.y - (el.fontSize * 0.85);

                                for (let i = 0; i < lines.length; i++) {
                                    pageToSign.drawText(lines[i], {
                                        x: el.x,
                                        y: currentY,
                                        size: el.fontSize,
                                        font: font,
                                        color: hexToRgbPdf(el.color),
                                    });
                                    currentY -= lineHeight; // Bajar para la siguiente línea
                                }
                            }
                        }
                    }

                    const pdfBytesSaved = await pdfDoc.save();
                    const blob = new Blob([pdfBytesSaved], { type: 'application/pdf' });
                    
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'Documento_Editado.pdf';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                } catch (error) {
                    console.error("Error al procesar PDF:", error);
                    alert("Hubo un error al generar el PDF.");
                }
            };

            const currentElements = placedElements[currentPage] || [];

            return (
                <div className="flex flex-col h-full pt-[64px]">
                    {/* Barra Superior Fija */}
                    <header className="fixed top-0 left-0 w-full bg-white border-b border-gray-200 px-4 py-3 shadow-md flex flex-wrap gap-4 items-center justify-between z-50 min-h-[64px]">
                        {appMode === 'landing' && (
                            <div className="flex gap-3 items-center w-full justify-center">
                                <h2 className="text-xl font-bold text-gray-800">Suite PDF</h2>
                            </div>
                        )}

                        {appMode === 'merge' && (
                            <>
                                <div className="flex gap-3 items-center">
                                    <button onClick={() => setAppMode('landing')} className="flex items-center gap-2 px-3 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors text-sm font-medium">
                                        <ArrowLeftIcon /> <span className="hidden sm:inline">Volver</span>
                                    </button>
                                    <label className="flex items-center gap-2 px-4 py-2 bg-blue-50 border border-blue-200 text-blue-700 rounded-lg hover:bg-blue-100 transition-colors cursor-pointer text-sm font-medium shadow-sm">
                                        <PlusIcon /> <span className="hidden sm:inline">Añadir más PDFs</span>
                                        <input type="file" multiple accept="application/pdf" className="hidden" onChange={handleMergeUpload} />
                                    </label>
                                </div>
                                <div className="flex gap-4 items-center">
                                    <button onClick={performMerge} className="flex items-center gap-2 px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors shadow-sm shadow-green-500/30 text-sm font-bold">
                                        <LayersIcon /> <span>Unir y Descargar</span>
                                    </button>
                                </div>
                            </>
                        )}

                        {appMode === 'editor' && (
                            <>
                                <div className="flex gap-3 items-center">
                                    <button onClick={() => setAppMode('landing')} className="flex items-center gap-2 px-3 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors text-sm font-medium" title="Volver al inicio">
                                        <ArrowLeftIcon />
                                    </button>
                                    <label className="flex items-center gap-2 px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer text-sm font-medium shadow-sm">
                                        <FileUpIcon /> <span className="hidden sm:inline">Abrir PDF</span>
                                        <input type="file" accept="application/pdf" className="hidden" onChange={handleFileUpload} />
                                    </label>

                                    {pdfImage && (
                                        <div className="flex gap-2">
                                            <button onClick={() => setShowSignatureModal(true)} className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors shadow-sm text-sm font-medium">
                                                <PenIcon /> <span className="hidden md:inline">Añadir Firma</span>
                                            </button>
                                            <button onClick={handleAddTextToPage} className="flex items-center gap-2 px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors shadow-sm text-sm font-medium">
                                                <TypeIcon /> <span className="hidden md:inline">Añadir Texto</span>
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {pdfImage && (
                                    <div className="flex gap-4 items-center flex-wrap">
                                        <div className="flex items-center gap-1 bg-gray-100 rounded-lg px-1 py-1">
                                            <button onClick={() => setZoom(z => Math.max(z - 0.25, 0.5))} className="p-1.5 rounded hover:bg-white shadow-sm text-gray-700" title="Alejar"><ZoomOutIcon /></button>
                                            <span className="text-xs font-bold w-12 text-center text-gray-600">{Math.round(zoom * 100)}%</span>
                                            <button onClick={() => setZoom(z => Math.min(z + 0.25, 3))} className="p-1.5 rounded hover:bg-white shadow-sm text-gray-700" title="Acercar"><ZoomInIcon /></button>
                                        </div>

                                        {totalPages > 1 && (
                                            <div className="flex items-center gap-3 bg-gray-100 rounded-lg px-2 py-1">
                                                <button onClick={() => changePage(-1)} disabled={currentPage === 1} className="w-8 h-8 flex items-center justify-center rounded bg-white shadow-sm hover:bg-gray-50 disabled:opacity-50 font-bold">&lt;</button>
                                                <span className="text-sm font-medium text-gray-700 w-20 text-center">Pág {currentPage} / {totalPages}</span>
                                                <button onClick={() => changePage(1)} disabled={currentPage === totalPages} className="w-8 h-8 flex items-center justify-center rounded bg-white shadow-sm hover:bg-gray-50 disabled:opacity-50 font-bold">&gt;</button>
                                            </div>
                                        )}
                                        
                                        <button onClick={exportSignedPDF} className="flex items-center gap-2 px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors shadow-sm shadow-green-500/30 text-sm font-bold">
                                            <SaveIcon /> <span className="hidden sm:inline">Guardar PDF</span>
                                        </button>
                                    </div>
                                )}
                            </>
                        )}
                    </header>

                    {/* Área de Trabajo */}
                    <main className="flex-1 overflow-auto bg-slate-200 p-4 md:p-8 relative custom-scroll h-[calc(100vh-64px)]" onClick={handleBackgroundClick}>
                        <div className="min-h-full w-full flex items-start justify-center">
                            
                            {appMode === 'landing' && (
                                // --- PANTALLA DE INICIO (LANDING) ---
                                <div className="mt-10 md:mt-16 w-full max-w-5xl flex flex-col items-center justify-center p-6">
                                    <div className="text-center mb-10">
                                        <h1 className="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight mb-4">
                                            Herramientas PDF <span className="text-blue-600">profesionales</span>
                                        </h1>
                                        <p className="text-lg text-gray-600 max-w-2xl mx-auto">
                                            Edita, firma o une tus documentos directamente en tu navegador. Tus archivos nunca se envían a ningún servidor, manteniendo 100% de privacidad.
                                        </p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full">
                                        {/* Card 1: Editor y Firma */}
                                        <div className="bg-white rounded-3xl shadow-xl p-8 md:p-10 border border-gray-100 flex flex-col items-center text-center transition-transform hover:scale-[1.02] duration-300">
                                            <div className="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mb-6 text-blue-500 shadow-inner">
                                                <PenIcon />
                                            </div>
                                            <h2 className="text-2xl font-bold text-gray-800 mb-2">Firmar PDF</h2>
                                            <p className="text-gray-500 mb-8 flex-1">Añade tu firma, escribe textos y ajusta el formato. Rellena formularios fácilmente.</p>
                                            
                                            <label className="flex items-center gap-3 px-6 py-3 bg-blue-600 text-white text-lg rounded-xl hover:bg-blue-700 transition-colors cursor-pointer font-semibold shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 w-full justify-center">
                                                <FileUpIcon /> Abrir Archivo PDF
                                                <input type="file" accept="application/pdf" className="hidden" onChange={handleFileUpload} />
                                            </label>
                                        </div>

                                        {/* Card 2: Unir PDFs */}
                                        <div className="bg-white rounded-3xl shadow-xl p-8 md:p-10 border border-gray-100 flex flex-col items-center text-center transition-transform hover:scale-[1.02] duration-300">
                                            <div className="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mb-6 text-green-500 shadow-inner">
                                                <LayersIcon />
                                            </div>
                                            <h2 className="text-2xl font-bold text-gray-800 mb-2">Unir PDFs</h2>
                                            <p className="text-gray-500 mb-8 flex-1">Selecciona varios documentos PDF, ordénalos como prefieras y únelos en un solo archivo.</p>
                                            
                                            <label className="flex items-center gap-3 px-6 py-3 bg-green-600 text-white text-lg rounded-xl hover:bg-green-700 transition-colors cursor-pointer font-semibold shadow-lg shadow-green-500/30 hover:shadow-green-500/50 w-full justify-center">
                                                <LayersIcon /> Seleccionar PDFs
                                                <input type="file" multiple accept="application/pdf" className="hidden" onChange={handleMergeUpload} />
                                            </label>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full mt-16">
                                        <div className="bg-white/60 backdrop-blur-sm p-6 rounded-2xl border border-gray-200/50 text-center flex flex-col items-center">
                                            <div className="text-green-600 mb-3 bg-green-100 p-3 rounded-full"><ShieldIcon /></div>
                                            <h3 className="font-semibold text-gray-800 mb-1">100% Privado</h3>
                                            <p className="text-sm text-gray-500">El procesamiento ocurre en tu dispositivo. Sin subir a la nube.</p>
                                        </div>
                                        <div className="bg-white/60 backdrop-blur-sm p-6 rounded-2xl border border-gray-200/50 text-center flex flex-col items-center">
                                            <div className="text-purple-600 mb-3 bg-purple-100 p-3 rounded-full"><TypeIcon /></div>
                                            <h3 className="font-semibold text-gray-800 mb-1">Textos y Estilos</h3>
                                            <p className="text-sm text-gray-500">Escribe sobre el PDF y ajusta la fuente, tamaño y color libremente.</p>
                                        </div>
                                        <div className="bg-white/60 backdrop-blur-sm p-6 rounded-2xl border border-gray-200/50 text-center flex flex-col items-center">
                                            <div className="text-yellow-600 mb-3 bg-yellow-100 p-3 rounded-full"><LayersIcon /></div>
                                            <h3 className="font-semibold text-gray-800 mb-1">Gestión Rápida</h3>
                                            <p className="text-sm text-gray-500">Une múltiples archivos en orden para organizar mejor tu trabajo.</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {appMode === 'merge' && (
                                // --- PANTALLA DE UNIÓN DE PDFs ---
                                <div className="mt-8 w-full max-w-3xl flex flex-col items-center p-4">
                                    <div className="bg-white rounded-2xl shadow-xl border border-gray-200 w-full overflow-hidden">
                                        <div className="p-6 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
                                            <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                                <LayersIcon /> Documentos para unir
                                            </h2>
                                            <span className="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">
                                                {mergeFiles.length} archivos
                                            </span>
                                        </div>
                                        <div className="p-4">
                                            {mergeFiles.length === 0 ? (
                                                <div className="text-center py-10 text-gray-500">
                                                    No hay documentos seleccionados.
                                                </div>
                                            ) : (
                                                <ul className="space-y-3">
                                                    {mergeFiles.map((fileItem, index) => (
                                                        <li key={fileItem.id} className="flex items-center justify-between p-3 bg-white border border-gray-200 rounded-xl shadow-sm hover:border-blue-300 transition-colors">
                                                            <div className="flex items-center gap-3 overflow-hidden">
                                                                <div className="bg-red-100 text-red-500 p-2 rounded-lg shrink-0">
                                                                    <FileUpIcon />
                                                                </div>
                                                                <span className="font-medium text-gray-700 truncate" title={fileItem.name}>
                                                                    {fileItem.name}
                                                                </span>
                                                            </div>
                                                            <div className="flex items-center gap-2 shrink-0 ml-4">
                                                                <button 
                                                                    onClick={() => moveMergeFile(index, -1)} 
                                                                    disabled={index === 0}
                                                                    className="p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg disabled:opacity-30 disabled:hover:bg-transparent disabled:cursor-not-allowed transition-colors"
                                                                    title="Mover arriba"
                                                                >
                                                                    <ArrowUpIcon />
                                                                </button>
                                                                <button 
                                                                    onClick={() => moveMergeFile(index, 1)} 
                                                                    disabled={index === mergeFiles.length - 1}
                                                                    className="p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg disabled:opacity-30 disabled:hover:bg-transparent disabled:cursor-not-allowed transition-colors"
                                                                    title="Mover abajo"
                                                                >
                                                                    <ArrowDownIcon />
                                                                </button>
                                                                <div className="w-px h-6 bg-gray-200 mx-1"></div>
                                                                <button 
                                                                    onClick={() => setMergeFiles(prev => prev.filter(f => f.id !== fileItem.id))}
                                                                    className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors"
                                                                    title="Eliminar"
                                                                >
                                                                    <TrashIcon />
                                                                </button>
                                                            </div>
                                                        </li>
                                                    ))}
                                                </ul>
                                            )}
                                        </div>
                                    </div>
                                    {mergeFiles.length > 0 && mergeFiles.length < 2 && (
                                        <p className="mt-6 text-orange-600 font-medium text-center bg-orange-50 px-4 py-2 rounded-lg border border-orange-200">
                                            Añade al menos un documento más para poder unirlos.
                                        </p>
                                    )}
                                </div>
                            )}

                            {appMode === 'editor' && pdfImage && (
                                /* CONTENEDOR PDF */
                                <div 
                                    ref={containerRef}
                                    className="relative bg-white shadow-2xl ring-1 ring-gray-900/5 select-none origin-top"
                                    style={{ width: pdfDimensions.width * zoom, height: pdfDimensions.height * zoom }}
                                >
                                    <img src={pdfImage} alt="Documento" className="w-full h-full object-contain pointer-events-none" />

                                    {/* LÍNEAS GUÍA VISUALES */}
                                    {guides.x !== null && (
                                        <div className="absolute top-0 bottom-0 border-l-2 border-blue-500 border-dashed z-10 pointer-events-none opacity-60" style={{ left: guides.x * zoom }}></div>
                                    )}
                                    {guides.y !== null && (
                                        <div className="absolute left-0 right-0 border-t-2 border-blue-500 border-dashed z-10 pointer-events-none opacity-60" style={{ top: guides.y * zoom }}></div>
                                    )}

                                    {/* RENDERIZAR ELEMENTOS */}
                                    {currentElements.map(el => {
                                        const isActive = activeElementId === el.id;

                                        // RENDER FIRMA
                                        if (el.type === 'signature') {
                                            return (
                                                <div 
                                                    key={el.id}
                                                    className={`absolute touch-none cursor-move group ${isActive || interaction?.id === el.id ? 'ring-2 ring-blue-500 ring-dashed z-20' : 'hover:ring-2 hover:ring-blue-400 hover:ring-dashed z-10'}`}
                                                    style={{ left: el.x * zoom, top: el.y * zoom, width: el.w * zoom, height: el.h * zoom }}
                                                    onMouseDown={(e) => startInteraction(e, 'drag', el)}
                                                    onTouchStart={(e) => startInteraction(e, 'drag', el)}
                                                    onClick={(e) => { e.stopPropagation(); setActiveElementId(el.id); }}
                                                >
                                                    <img src={el.dataUrl} className="w-full h-full object-contain pointer-events-none drop-shadow-md" alt="Firma" />
                                                    {isActive && (
                                                        <button onClick={(e) => { e.stopPropagation(); removeElement(el.id); }} className="absolute -top-3 -right-3 bg-red-500 text-white rounded-full p-1.5 shadow-md z-30">
                                                            <XIcon />
                                                        </button>
                                                    )}
                                                    <div className={`absolute -bottom-2 -right-2 w-5 h-5 bg-white border-2 border-blue-600 rounded-full cursor-nwse-resize shadow-sm ${isActive ? 'block' : 'hidden group-hover:block'}`}
                                                        onMouseDown={(e) => startInteraction(e, 'resize', el)}
                                                        onTouchStart={(e) => startInteraction(e, 'resize', el)}
                                                    ></div>
                                                </div>
                                            );
                                        }

                                        // RENDER TEXTO
                                        if (el.type === 'text') {
                                            return (
                                                <div 
                                                    key={el.id}
                                                    className={`absolute z-20 ${isActive ? 'ring-2 ring-purple-500 ring-dashed bg-purple-50/30' : 'hover:ring-1 hover:ring-gray-300'}`}
                                                    style={{ left: el.x * zoom, top: el.y * zoom, width: (el.w * zoom) + 'px' }}
                                                    onClick={(e) => { e.stopPropagation(); setActiveElementId(el.id); }}
                                                >
                                                    {/* Tirador para ajustar ancho del texto */}
                                                    {isActive && (
                                                        <div 
                                                            className="absolute top-0 -right-3 w-6 h-full cursor-e-resize z-40 flex items-center justify-center group/handle"
                                                            onMouseDown={(e) => startInteraction(e, 'resizeTextWidth', el)}
                                                            onTouchStart={(e) => startInteraction(e, 'resizeTextWidth', el)}
                                                        >
                                                            <div className="w-1.5 h-6 bg-purple-400 rounded-full group-hover/handle:bg-purple-600 shadow-sm opacity-50 group-hover/handle:opacity-100 transition-opacity"></div>
                                                        </div>
                                                    )}

                                                    {/* Barra de herramientas flotante de Texto */}
                                                    {isActive && (
                                                        <div className="absolute bottom-full left-0 mb-2 bg-white rounded-lg shadow-xl border border-gray-200 flex items-center gap-2 p-2 whitespace-nowrap z-30"
                                                             onClick={e => e.stopPropagation()} // Prevenir cerrar al clickear
                                                             onMouseDown={e => e.stopPropagation()} // Prevenir arrastre accidental
                                                        >
                                                            {/* Arrastrador */}
                                                            <div className="cursor-move p-1 text-gray-400 hover:text-gray-700 bg-gray-50 rounded"
                                                                 onMouseDown={(e) => startInteraction(e, 'drag', el)}
                                                                 onTouchStart={(e) => startInteraction(e, 'drag', el)}
                                                                 title="Arrastrar"
                                                            >
                                                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="19 9 22 12 19 15"/><polyline points="9 19 12 22 15 19"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
                                                            </div>
                                                            <div className="w-px h-5 bg-gray-300"></div>
                                                            
                                                            {/* Fuente */}
                                                            <select 
                                                                value={el.fontFamily} 
                                                                onChange={(e) => updateTextElement(el.id, { fontFamily: e.target.value })}
                                                                className="text-sm bg-gray-50 border border-gray-200 rounded p-1 outline-none font-medium"
                                                            >
                                                                <option value="Helvetica">Arial / Normal</option>
                                                                <option value="Times New Roman">Times (Serif)</option>
                                                                <option value="Courier">Courier (Mono)</option>
                                                            </select>

                                                            {/* Tamaño */}
                                                            <select 
                                                                value={el.fontSize} 
                                                                onChange={(e) => updateTextElement(el.id, { fontSize: parseInt(e.target.value) })}
                                                                className="text-sm bg-gray-50 border border-gray-200 rounded p-1 outline-none w-14"
                                                            >
                                                                {[8,10,12,14,16,18,20,24,28,32,36,48].map(sz => <option key={sz} value={sz}>{sz}px</option>)}
                                                            </select>

                                                            <div className="w-px h-5 bg-gray-300 mx-1"></div>

                                                            {/* Estilos: Negrita y Cursiva */}
                                                            <div className="flex gap-1">
                                                                <button 
                                                                    onClick={() => updateTextElement(el.id, { isBold: !el.isBold })} 
                                                                    className={`p-1.5 rounded transition-colors ${el.isBold ? 'bg-gray-300 text-black' : 'text-gray-600 hover:bg-gray-100'}`} 
                                                                    title="Negrita"
                                                                >
                                                                    <BoldIcon />
                                                                </button>
                                                                <button 
                                                                    onClick={() => updateTextElement(el.id, { isItalic: !el.isItalic })} 
                                                                    className={`p-1.5 rounded transition-colors ${el.isItalic ? 'bg-gray-300 text-black' : 'text-gray-600 hover:bg-gray-100'}`} 
                                                                    title="Cursiva"
                                                                >
                                                                    <ItalicIcon />
                                                                </button>
                                                            </div>

                                                            <div className="w-px h-5 bg-gray-300 mx-1"></div>

                                                            {/* Color */}
                                                            <input 
                                                                type="color" 
                                                                value={el.color}
                                                                onChange={(e) => updateTextElement(el.id, { color: e.target.value })}
                                                                className="w-6 h-6 p-0 border-0 rounded cursor-pointer bg-transparent"
                                                                title="Color del texto"
                                                            />
                                                            
                                                            <div className="w-px h-5 bg-gray-300 mx-1"></div>
                                                            
                                                            {/* Eliminar */}
                                                            <button onClick={() => removeElement(el.id)} className="text-red-500 hover:bg-red-50 p-1 rounded">
                                                                <TrashIcon />
                                                            </button>
                                                        </div>
                                                    )}

                                                    {/* Editor de Texto (Textarea auto-expandible) */}
                                                    <textarea
                                                        id={`text-input-${el.id}`}
                                                        value={el.text}
                                                        onChange={(e) => {
                                                            updateTextElement(el.id, { text: e.target.value });
                                                            // Autoajustar altura
                                                            e.target.style.height = 'auto';
                                                            e.target.style.height = e.target.scrollHeight + 'px';
                                                        }}
                                                        onFocus={(e) => {
                                                            e.target.style.height = 'auto';
                                                            e.target.style.height = e.target.scrollHeight + 'px';
                                                        }}
                                                        style={{
                                                            fontFamily: el.fontFamily === 'Helvetica' ? 'Arial, sans-serif' : el.fontFamily,
                                                            fontSize: `${el.fontSize * zoom}px`,
                                                            color: el.color,
                                                            fontWeight: el.isBold ? 'bold' : 'normal',
                                                            fontStyle: el.isItalic ? 'italic' : 'normal',
                                                            pointerEvents: isActive ? 'auto' : 'none' // Evita que robe clicks si no está activo
                                                        }}
                                                        className="text-element-input"
                                                        placeholder="Escribe aquí..."
                                                        rows={1}
                                                    />
                                                    
                                                    {/* Overlay transparente para permitir activar el texto y arrastrarlo fácilmente si no está activo */}
                                                    {!isActive && (
                                                        <div 
                                                            className="absolute inset-0 cursor-pointer"
                                                            onMouseDown={(e) => startInteraction(e, 'drag', el)}
                                                            onTouchStart={(e) => startInteraction(e, 'drag', el)}
                                                        ></div>
                                                    )}
                                                </div>
                                            );
                                        }
                                        return null;
                                    })}
                                </div>
                            )}
                        </div>
                    </main>

                    {showSignatureModal && (
                        <SignatureManager 
                            savedSignatures={savedSignatures}
                            setSavedSignatures={setSavedSignatures}
                            onSelectSignature={handleAddSignatureToPage}
                            onClose={() => setShowSignatureModal(false)}
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
